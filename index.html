<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Datos</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">
        <h1>Registro de Entrada</h1>

        <form>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" placeholder="Ingresa tu nombre">
            </div>

            <div class="form-group">
                <label>Matrícula</label>
                <input type="text" placeholder="Ej: 20231234">
            </div>

            <div class="form-group">
                <label>Carrera</label>
                <input type="text" placeholder="Ej: Ingeniería en Sistemas">
            </div>

            <div class="form-group">
                <label>Día</label>
                <input type="date">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Hora de Entrada</label>
                    <input type="time">
                </div>

                <div class="form-group">
                    <label>Hora de Salida</label>
                    <input type="time">
                </div>
            </div>

            <div class="form-group">
                <label>Asunto</label>
                <textarea placeholder="Describe el motivo"></textarea>
            </div>

            <button type="submit">Registrar</button>
        </form>
    </div>

</body>
</html>
