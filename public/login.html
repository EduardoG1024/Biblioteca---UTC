<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <nav>
        <h1>Login Control de Asistencias UTC</h1>
    </nav>
    <form action="/verificado" method="post" enctype="application/x-www-form-urlencoded">
        <label for="">Correo: </label>
        <input type="email" name="correo" id="" required>
        <label for="">Contraseña: </label>
        <input type="password" name="contraseña" id="" required>
        <button type="submit">Ingresar</button>
    </form>
</body>
</html>
