<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Datos</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">
        <h1>Registro Biblioteca</h1>

        <form action="/registro" method="post" enctype="application/x-www-form-urlencoded">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="Estudiante" placeholder="Ingresa tu nombre">
            </div>

            <div class="form-group">
                <label>Matrícula</label>
                <input type="text" name="Matricula" placeholder="Ej: 20231234">
            </div>

            <div class="form-group">
                <label>Carrera</label>
                <input type="text" name="Carrera" placeholder="Ej: Ingeniería en Sistemas">
            </div>

            <div class="form-group">
                <label>Día</label>
                <input type="date" name="Fecha">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Hora de Entrada</label>
                    <input type="time" name="HoraEntrada">
                </div>

                <div class="form-group">
                    <label>Hora de Salida</label>
                    <input type="time" name="HoraSalida">
                </div>
            </div>

            <div class="form-group">
                <label>Asunto</label>
                <textarea placeholder="Describe el motivo" name="Asunto"></textarea>
            </div>

            <button type="submit">Registrar</button>
        </form>
    </div>

</body>
</html>
